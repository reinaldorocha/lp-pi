    <!-- JSON.stringify circular reference and React element protection -->
    <script>
      (function() {
        var originalStringify = JSON.stringify;
        JSON.stringify = function(value, replacer, space) {
          var seen = new WeakSet();
          return originalStringify(value, function(key, val) {
            if (val && typeof val === 'object') {
              if (seen.has(val)) {
                return '[Circular]';
              }
              // Prevent serializing DOM elements or React internal Fiber nodes
              if (
                val instanceof HTMLElement || 
                (val.constructor && (val.constructor.name === 'HTMLButtonElement' || val.constructor.name === 'FiberNode' || val.constructor.name === 'SyntheticBaseEvent')) ||
                key.startsWith('__react')
              ) {
                return '[DOMElement_Or_ReactNode]';
              }
              seen.add(val);
            }
            if (typeof replacer === 'function') {
              return replacer(key, val);
            }
            return val;
          }, space);
        };
      })();
    </script>
